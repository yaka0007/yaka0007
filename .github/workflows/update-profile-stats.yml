# Met à jour les badges de stats du README profil (contributions + commits sur l’année),
# via l’API GraphQL — inclut l’activité sur les dépôts privés pour TON compte.
#
# IMPORTANT : le GITHUB_TOKEN des Actions n’est pas ton utilisateur (c’est github-actions[bot]).
# Il faut un PAT CLASSIQUE (pas fine-grained) avec scope `read:user` uniquement.
# Les PAT fine-grained provoquent souvent l’erreur GraphQL « Something went wrong » sur les contributions.
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: PROFILE_STATS_PAT   Value: classic PAT → https://github.com/settings/tokens → Generate new token (classic)
#
# Déclenché : chaque lundi 06:00 UTC, ou manuellement (workflow_dispatch).

name: Update profile stats

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require PROFILE_STATS_PAT secret
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
        run: |
          if [ -z "$PROFILE_STATS_PAT" ]; then
            echo "::error::Add classic PAT (not fine-grained) with scope read:user as PROFILE_STATS_PAT — see workflow header."
            exit 1
          fi

      - name: Fetch GitHub stats & rewrite README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROFILE_STATS_PAT }}
          script: |
            const fs = require('fs');
            const path = 'README.md';
            const now = new Date();
            const year = now.getUTCFullYear();
            const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0)).toISOString();
            const to = now.toISOString();

            const failHint =
              'GraphQL contributions failed. Use a CLASSIC personal access token (not fine-grained) with scope read:user only. ' +
              'https://github.com/settings/tokens → Generate new token (classic). Update repo secret PROFILE_STATS_PAT.';

            let login;
            try {
              const ping = await github.graphql(`query { viewer { login } }`);
              login = ping.viewer.login;
            } catch (e) {
              core.setFailed(`${failHint} (viewer login: ${e.message})`);
              throw e;
            }

            let totalContrib;
            try {
              const cal = await github.graphql(
                `query($from: DateTime!, $to: DateTime!) {
                  viewer { contributionCalendar(from: $from, to: $to) { totalContributions } }
                }`,
                { from, to }
              );
              totalContrib = cal.viewer.contributionCalendar.totalContributions;
            } catch (e) {
              core.setFailed(`${failHint} (contributionCalendar: ${e.message})`);
              throw e;
            }

            let commitContrib;
            try {
              const col = await github.graphql(
                `query($from: DateTime!, $to: DateTime!) {
                  viewer { contributionsCollection(from: $from, to: $to) { totalCommitContributions } }
                }`,
                { from, to }
              );
              commitContrib = col.viewer.contributionsCollection.totalCommitContributions;
            } catch (e) {
              core.setFailed(`${failHint} (contributionsCollection: ${e.message})`);
              throw e;
            }

            const data = { viewer: { login } };

            const badgeUrl = (label, message, color) =>
              'https://img.shields.io/static/v1?' +
              new URLSearchParams({
                label,
                message: String(message),
                color,
                logo: 'github',
                style: 'flat-square',
              }).toString();

            const block = [
              '<!--PROFILE_STATS_START-->',
              `![GitHub contributions ${year}](${badgeUrl('contributions ' + year, totalContrib, '22c55e')})`,
              `![Commits ${year}](${badgeUrl('commits ' + year, commitContrib, '0369a1')})`,
              '*Includes private repos · updated weekly by Actions*',
              '<!--PROFILE_STATS_END-->',
            ].join('\n');

            let readme = fs.readFileSync(path, 'utf8');
            if (!readme.includes('<!--PROFILE_STATS_START-->')) {
              core.setFailed('README.md: missing <!--PROFILE_STATS_START--> markers');
              return;
            }
            readme = readme.replace(
              /<!--PROFILE_STATS_START-->[\s\S]*?<!--PROFILE_STATS_END-->/,
              block
            );
            fs.writeFileSync(path, readme);

            core.info(`viewer=${data.viewer.login} contributions=${totalContrib} commits=${commitContrib}`);

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore(profile): refresh GitHub stats badges"
            git push
          fi

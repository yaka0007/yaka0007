# Met à jour les badges de stats du README profil (contributions + commits sur l’année),
# Préfère l’API GraphQL (privé + public). Si github.com renvoie « Something went wrong »,
# repli : graphe public (HTML) + Search commits (plafond 1000 ; surtout public sans scope repo).
#
# IMPORTANT : le GITHUB_TOKEN des Actions n’est pas ton utilisateur (c’est github-actions[bot]).
# PAT CLASSIQUE avec scope exact : `read:user` (section « User » des cases à cocher).
# Vérifie sur la page du token : bouton « Configure SSO » à cliquer pour chaque org SAML — sinon l’API peut planter.
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: PROFILE_STATS_PAT
#
# Déclenché : chaque lundi 06:00 UTC, ou manuellement (workflow_dispatch).

name: Update profile stats

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require PROFILE_STATS_PAT secret
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
        run: |
          if [ -z "$PROFILE_STATS_PAT" ]; then
            echo "::error::Add classic PAT (not fine-grained) with scope read:user as PROFILE_STATS_PAT — see workflow header."
            exit 1
          fi

      - name: Verify PAT scopes (header only, token hidden)
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
        run: |
          echo "Expected scope line contains: read:user"
          curl -sS -I -H "Authorization: Bearer ${PROFILE_STATS_PAT}" https://api.github.com/user \
            | tr -d '\r' | grep -i '^x-oauth-scopes:' || echo "::warning::No X-OAuth-Scopes (unexpected for classic PAT)"

      - name: Fetch GitHub stats & rewrite README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROFILE_STATS_PAT }}
          script: |
            const fs = require('fs');
            const path = 'README.md';
            const now = new Date();
            const year = now.getUTCFullYear();
            const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0)).toISOString();
            const to = now.toISOString();

            // Repo profile = owner du dépôt (ex. yaka0007/yaka0007 → yaka0007). user(login:) est souvent plus stable que viewer avec un PAT.
            const login = github.context.repo.owner;

            const toDay = now.toISOString().slice(0, 10);

            /** Somme des data-count sur la page contributions publique (pas d’auth). */
            async function contributionsFromPublicPage() {
              const url =
                'https://github.com/users/' +
                encodeURIComponent(login) +
                '/contributions?from=' +
                year +
                '-01-01&to=' +
                toDay;
              const res = await fetch(url, {
                headers: {
                  'User-Agent': 'yaka0007-profile-stats-workflow',
                  Accept: 'text/html',
                },
              });
              if (!res.ok) throw new Error('contributions page HTTP ' + res.status);
              const html = await res.text();
              let sum = 0;
              const re = /data-count="(\d+)"/g;
              let m;
              while ((m = re.exec(html)) !== null) sum += parseInt(m[1], 10);
              return sum;
            }

            /** Search API — total_count plafonné à 1000 ; indexe surtout l’activité publique. */
            async function commitsFromSearch() {
              const q = 'author:' + login + ' committer-date:' + year + '-01-01..' + toDay;
              const { data } = await github.rest.search.commits({ q, per_page: 1 });
              return data.total_count;
            }

            let totalContrib;
            let commitContrib;
            let footnote =
              '*Includes private repos · updated weekly by Actions*';

            try {
              const out = await github.graphql(
                `query($login: String!, $from: DateTime!, $to: DateTime!) {
                  user(login: $login) {
                    contributionsCollection(from: $from, to: $to) {
                      totalCommitContributions
                      contributionCalendar { totalContributions }
                    }
                  }
                }`,
                { login, from, to }
              );
              if (!out.user || !out.user.contributionsCollection) {
                throw new Error('no contributionsCollection for user(login: "' + login + '")');
              }
              const col = out.user.contributionsCollection;
              totalContrib = col.contributionCalendar.totalContributions;
              commitContrib = col.totalCommitContributions;
            } catch (e1) {
              core.warning('GraphQL full query failed (GitHub often returns generic errors here): ' + e1.message);
              try {
                const out = await github.graphql(
                  `query($login: String!, $from: DateTime!, $to: DateTime!) {
                    user(login: $login) {
                      contributionsCollection(from: $from, to: $to) {
                        totalCommitContributions
                      }
                    }
                  }`,
                  { login, from, to }
                );
                if (!out.user || !out.user.contributionsCollection) {
                  throw new Error('minimal GraphQL: no user');
                }
                commitContrib = out.user.contributionsCollection.totalCommitContributions;
                totalContrib = await contributionsFromPublicPage();
                footnote =
                  '*Commits: GraphQL · contributions graph: public page (GraphQL calendar failed) · weekly*';
                core.info('Used minimal GraphQL + public contributions page for total.');
              } catch (e2) {
                core.warning('GraphQL minimal failed: ' + e2.message);
                try {
                  totalContrib = await contributionsFromPublicPage();
                } catch (e3) {
                  core.warning('Public contributions page: ' + e3.message);
                  totalContrib = 0;
                }
                try {
                  commitContrib = await commitsFromSearch();
                } catch (e4) {
                  core.warning('Commit search: ' + e4.message);
                  commitContrib = 0;
                }
                footnote =
                  '*Fallback: public contribution grid + commit search (max 1000; private activity may be incomplete) — GraphQL error on github.com · weekly*';
                core.info('Used public-page + search fallback.');
              }
            }

            const data = { viewer: { login } };

            const badgeUrl = (label, message, color) =>
              'https://img.shields.io/static/v1?' +
              new URLSearchParams({
                label,
                message: String(message),
                color,
                logo: 'github',
                style: 'flat-square',
              }).toString();

            const block = [
              '<!--PROFILE_STATS_START-->',
              `![GitHub contributions ${year}](${badgeUrl('contributions ' + year, totalContrib, '22c55e')})`,
              `![Commits ${year}](${badgeUrl('commits ' + year, commitContrib, '0369a1')})`,
              footnote,
              '<!--PROFILE_STATS_END-->',
            ].join('\n');

            let readme = fs.readFileSync(path, 'utf8');
            if (!readme.includes('<!--PROFILE_STATS_START-->')) {
              core.setFailed('README.md: missing <!--PROFILE_STATS_START--> markers');
              return;
            }
            readme = readme.replace(
              /<!--PROFILE_STATS_START-->[\s\S]*?<!--PROFILE_STATS_END-->/,
              block
            );
            fs.writeFileSync(path, readme);

            core.info(`viewer=${data.viewer.login} contributions=${totalContrib} commits=${commitContrib}`);

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore(profile): refresh GitHub stats badges"
            git push
          fi
